
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/site.css?v=3" />
</head>
<body>

<div class="page">

  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">Arrivals Property Scout</div>
    </div>
    <div class="topbar-row">
      <input id="listing-url" placeholder="Listing URL (Airbnb, VRBO, etc.)" />
      <input id="image-url" placeholder="Image URL" />
      <button onclick="runSearch()">Run</button>
      <button id="export-btn" class="secondary" onclick="exportContactCsv()" disabled>Export Contact CSV</button>
    </div>
  </div>

  <div id="error-box" class="error"></div>

  <div class="board">

    <!-- STEP 1 -->
    <div class="panel">
      <div class="eyebrow">Step 1</div>
      <h2>Input</h2>
      <div id="input-status" class="status">Waiting</div>

      <div id="image-box" class="image-box">
        <div class="empty">No image</div>
      </div>

      <div id="input-meta" class="meta"></div>
    </div>

    <!-- STEP 2 -->
    <div class="panel">
      <div class="eyebrow">Step 2</div>
      <h2>Matches</h2>
      <div id="search-status" class="status">Waiting</div>

      <div class="scroll">
        <div id="match-grid" class="match-grid"></div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="panel">
      <div class="eyebrow">Step 3</div>
      <h2>Classify</h2>
      <div id="classify-summary" class="status">Waiting</div>
      <div class="scroll">
        <div id="classify-panel"></div>
      </div>
    </div>

    <!-- STEP 4 -->
    <div class="panel">
      <div class="eyebrow">Step 4</div>
      <h2>Contacts</h2>
      <div id="contact-summary" class="status">Waiting</div>
      <div class="scroll">
        <div id="contact-panel"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = "/api";
let lastExtracted = null;
let lastSearched = null;

function esc(s) {
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function setError(msg) {
  document.getElementById("error-box").textContent = msg || "";
}

function renderInput(p) {
  document.getElementById("input-status").textContent = p.metadata.input_mode;

  const box = document.getElementById("image-box");
  if (p.active_image_url) {box.innerHTML = `<img src="${p.active_image_url}">`;}

  document.getElementById("input-meta").innerHTML = `
    <div class="k">source</div><div>${esc(p.listing_source)}</div>
    <div class="k">listing</div><div>${esc(p.submitted_listing_url)}</div>
    <div class="k">image</div><div>${esc(p.submitted_image_url)}</div>
    <div class="k">name</div><div>${esc(p.metadata?.name)}</div>
    <div class="k">city</div><div>${esc(p.metadata?.city)}</div>
    <div class="k">address</div><div>${esc(p.metadata?.address)}</div>
    <div class="k">room id</div><div>${esc(p.metadata?.room_id)}</div>
    <div class="k">images</div><div>${esc(p.metadata?.image_candidate_count)}</div>
  `;
}

function renderMatches(p) {
  document.getElementById("search-status").textContent =
    `${p.provider} (${p.raw_match_count})`;

  const grid = document.getElementById("match-grid");

  grid.innerHTML = p.matches.map(m => `
      <a href="${m.url}" target="_blank" class="match-card">
      <div class="thumb">
        <img src="${m.thumbnail_url || `https://www.google.com/s2/favicons?domain=${m.domain}`}" />
      </div>
      <div>
        <div class="domain">${esc(m.domain)}</div>
        <div class="title">${esc(m.title)}</div>
        <div class="badge-row">
          <span class="badge">${m.match_type}</span>
          <span class="badge">rank ${m.rank ?? "-"}</span>
          <span class="badge">d ${m.score1 ?? "-"}</span>
        </div>
      </div>
    </a>
  `).join("");
}

const LOGO_MAP = {
  "airbnb": "airbnb.png",
  "vrbo": "vrbo.png",
  "booking.com": "bookingcom.png",
  "expedia": "expedia.png",
  "tripadvisor": "tripadvisor.png",
  "agoda": "agoda.png",
  "hometogo": "hometogo.png",
  "vacasa": "vacasa.png",
  "lodgify": "lodgify.png",
  "ownerrez": "ownerrez.png",
  "hostaway": "hostaway.png",
  "guesty": "guesty.png",
  "hostfully": "hostfully.png",
  "hospitable": "hospitable.png",
  "smoobu": "smoobu.png",
  "instagram": "instagram.png",
  "direct": "direct.png",
  "hidden": "globe.png"
};

function logoSrc(name) {
  return `/logos/${LOGO_MAP[String(name || "").trim().toLowerCase()] || "globe.png"}`;
}

function bucketBy(arr, keyFn) {
  const out = {};
  for (const item of arr || []) {
    const key = keyFn(item);
    if (!out[key]) out[key] = [];
    out[key].push(item);
  }
  return out;
}

function rootLabel(domain) {
  return (domain || "").replace(/^www\./, "");
}


function renderClassification(p) {
  const otaRows = (p.ota || []).map(m => `
    <div class="classify-row">
      <img class="classify-logo" src="${logoSrc(m.platform)}" alt="">
      <div class="classify-main"> ${esc(m.platform || m.domain || "OTA")} </div>
      <div class="classify-meta">${esc(m.listing_id || "—")}</div>
    </div>
  `).join("");

  const directCount = (p.direct || []).length;

  const otherGrouped = bucketBy(p.unknown || [], m => m.platform || rootLabel(m.domain) || "Unknown");
  const otherRows = Object.entries(otherGrouped).map(([label, items]) => `
    <div class="classify-row">
      <img class="classify-logo" src="${logoSrc(label)}" alt="">
      <div class="classify-main">${esc(label)}</div>
      <div class="classify-meta">${items.length}</div>
    </div>
  `).join("");

  const hiddenGrouped = bucketBy(p.hidden || [], m => m.hidden_reason || "hidden");
  const hiddenRows = Object.entries(hiddenGrouped).map(([reason, items]) => `
    <div class="classify-row">
      <img class="classify-logo" src="${logoSrc("Hidden")}" alt="">
      <div class="classify-main">${esc(reason)}</div>
      <div class="classify-meta">${items.length}</div>
    </div>
  `).join("");

  document.getElementById("classify-summary").textContent =
    `${(p.ota || []).length} ota · ${directCount} direct/pms · ${(p.unknown || []).length} other · ${(p.hidden || []).length} hidden`;

  document.getElementById("classify-panel").innerHTML = `
    <div class="classify-section">
      <div class="classify-head">OTAs</div>
      ${otaRows || `<div class="pending">None</div>`}
    </div>

    <div class="classify-section">
      <div class="classify-head">Direct / PMS</div>
      <div class="classify-stat">${directCount}</div>
    </div>

    <div class="classify-section">
      <div class="classify-head">Other Sources</div>
      ${otherRows || `<div class="pending">None</div>`}
    </div>

    <div class="classify-section">
      <div class="classify-head">Hidden</div>
      ${hiddenRows || `<div class="pending">None</div>`}
    </div>
  `;
}


function renderContacts(p) {
  document.getElementById("contact-summary").textContent =
    `${p.records.length} checked`;

  document.getElementById("contact-panel").innerHTML = p.records.map(r => `
    <div class="match-card" style="margin-bottom:10px;">
      <div class="thumb"></div>
      <div>
        <div class="domain">${esc(r.domain)}</div>
        <div class="title">${esc(r.title || "")}</div>
        <div class="badge-row">
          <span class="badge">${esc(r.source_bucket || "-")}</span>
          <span class="badge">${esc(r.source_quality || "-")}</span>
          <span class="badge">rank ${r.rank ?? "-"}</span>
          <span class="badge">d ${r.score1 ?? "-"}</span>
        </div>
        <div style="margin-top:8px;font-size:12px;">
          ${r.address ? `<div>${esc(r.address)}</div>` : ``}
          ${(r.emails || []).map(e => `<div>${esc(e)}</div>`).join("")}
          ${(r.phones || []).map(ph => `<div>${esc(ph)}</div>`).join("")}
          ${!((r.emails || []).length || (r.phones || []).length) ? `<div class="pending">No contact found</div>` : ``}
          ${r.error ? `<div class="error">${esc(r.error)}</div>` : ``}
        </div>
      </div>
    </div>
  `).join("");
}
function emailQuality(email, domain) {
  const e = String(email || "").toLowerCase();
  const d = String(domain || "").toLowerCase();
  if (!e) return 0;
  if (e.endsWith("@" + d)) return 3;
  if (e.includes("@gmail.com") || e.includes("@outlook.com") || e.includes("@hotmail.com") || e.includes("@yahoo.com")) return 1;
  return 2;
}

function recordScore(r) {
  const direct = r.source_bucket === "direct" ? 1000 : 0;

  const sourceQuality =
    r.source_quality === "high" ? 200 :
    r.source_quality === "medium" ? 100 : 0;

  const bestEmailQ = Math.max(0, ...(r.emails || []).map(e => emailQuality(e, r.domain)));
  const emailScore = bestEmailQ * 100;

  const phoneScore = (r.phones || []).length > 0 ? 60 : 0;
  const addressScore = r.address ? 30 : 0;

  const score1Bonus = typeof r.score1 === "number" ? Math.max(0, 40 - r.score1) : 0;
  const rankBonus = typeof r.rank === "number" ? Math.max(0, 20 - r.rank) : 0;

  return direct + sourceQuality + emailScore + phoneScore + addressScore + score1Bonus + rankBonus;
}

function bestContactRecord(records) {
  return (records || [])
    .slice()
    .sort((a, b) => recordScore(b) - recordScore(a))[0] || null;
}

function csvCell(v) {
  const s = String(v ?? "");
  return `"${s.replaceAll(`"`, `""`)}"`;
}

function exportContactCsv() {
  if (!lastExtracted || !lastSearched) return;

  const p = lastExtracted.input_panel || {};
  const c = bestContactRecord(lastSearched.contact?.records || []);

  const row = [
    p.submitted_listing_url || "",
    p.metadata?.name || "",
    p.metadata?.address || c?.address || "",
    c?.source_bucket || "",
    c?.domain || "",
    c?.url || "",
    c?.emails?.[0] || "",
    c?.emails?.[1] || "",
    c?.phones?.[0] || "",
    c?.phones?.[1] || "",
    c?.rank ?? "",
    c?.score1 ?? "",
    c?.error || ""
  ];

  const csv = [["input_listing_url", "property_name", "property_address", "source_bucket",
      "source_domain", "source_url", "email_1", "email_2", "phone_1", "phone_2", "rank",
      "score1", "scrape_error"].map(csvCell).join(","), row.map(csvCell).join(",")].join("\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "contact_export.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function extract(body) {
  const r = await fetch(API + "/pipeline/extract", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  return await r.json();
}

async function search(body) {
  const r = await fetch(API + "/pipeline/search", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  return await r.json();
}


async function run(body) {
  setError("");

  const extracted = await extract(body);
  if (!extracted.ok) {
    setError(extracted.error);
    return;
  }
  lastExtracted = extracted;
  renderInput(extracted.input_panel);
  const searchBody = { ...body, selected_image_url: extracted.input_panel.active_image_url};
  const searched = await search(searchBody);
  if (!searched.ok) {
    setError(searched.error);
    return;
  }

  lastSearched = searched;
  document.getElementById("export-btn").disabled = false;
  renderMatches(searched.match_discovery);
  renderClassification(searched.classification);
  renderContacts(searched.contact);
}


function runSearch() {
  run({
    listing_url: document.getElementById("listing-url").value,
    image_url: document.getElementById("image-url").value,
  });
}

</script>

</body>
</html>
